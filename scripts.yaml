pc_bureau_remote_turn_on:
  alias: PC Bureau - Remote ON (écrans OFF + WOL)
  sequence:
  - service: switch.turn_off
    target:
      entity_id:
      - switch.switch_1
      - switch.switch_2
  - delay: 00:00:01
  - service: switch.turn_on
    target:
      entity_id: switch.pc_bureau
pc_bureau_remote_turn_off:
  alias: PC Bureau - Remote OFF (shutdown + écrans ON)
  sequence:
  - service: switch.turn_off
    target:
      entity_id: switch.pc_bureau
  - wait_template: '{{ is_state(''switch.pc_bureau'', ''off'') }}'
    timeout: 00:02:00
    continue_on_timeout: true
  - service: switch.turn_on
    target:
      entity_id:
      - switch.switch_1
      - switch.switch_2
pc_bureau_remote_toggle:
  alias: PC Bureau - Remote TOGGLE (ON/OFF automatique)
  sequence:
  - choose:
    - conditions:
      - condition: state
        entity_id: switch.pc_bureau
        state: 'on'
      sequence:
      - service: script.turn_on
        target:
          entity_id: script.pc_bureau_remote_turn_off
    default:
    - service: script.turn_on
      target:
        entity_id: script.pc_bureau_remote_turn_on
lancer_minuterie_chauffe_eau_cuisine:
  alias: Lancer minuterie Chauffe-eau cuisine (durée custom)
  description: Lit input_number.duree_custom_chauffe_eau_cuisine (minutes) et démarre
    le timer correspondant.
  mode: restart
  icon: mdi:timer-play-outline
  sequence:
  - variables:
      minutes: '{{ states(''input_number.duree_custom_chauffe_eau_cuisine'') | int(0)
        }}'
  - target:
      entity_id: timer.minuterie_chauffe_eau_cuisine
    data:
      duration: '{{ ''%02d:%02d:00'' % (minutes // 60, minutes % 60) }}'
    action: timer.start
