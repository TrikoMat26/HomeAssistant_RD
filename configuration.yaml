template:
  - binary_sensor:
      - name: "Lancement chauffe-eau opportun"
        unique_id: lancement_chauffe_eau_opportun
        device_class: power
        icon: >
          {% if this.state == 'on' %}mdi:water-boiler{% else %}mdi:water-boiler-off{% endif %}
        state: >
          {% set production = states('sensor.total_solaire') | float(0) %}
          {% set ecart_type = states('sensor.solaire_stabilite_stats') | float(9999) %}
          {% set heure = now().hour + now().minute / 60 %}

          {# Seuils ajustables #}
          {% set seuil_puissance = 1500 %}     {# Watts min pour lancer le CET #}
          {% set seuil_stabilite = 150 %}      {# Ecart-type max accepté (W) #}
          {% set heure_debut = 9.5 %}          {# Pas avant 9h30 #}
          {% set heure_fin = 16.5 %}           {# Pas après 16h30 #}

          {{ production >= seuil_puissance 
          and ecart_type <= seuil_stabilite
          and heure >= heure_debut
          and heure <= heure_fin }}

        attributes:
          production_actuelle: "{{ states('sensor.total_solaire') | float(0) | round(0) }} W"
          stabilite: "{{ states('sensor.solaire_stabilite_stats') | float(0) | round(0) }} W écart-type"
          motif_blocage: >
            {% set production = states('sensor.total_solaire') | float(0) %}
            {% set ecart_type = states('sensor.solaire_stabilite_stats') | float(9999) %}
            {% if production < 1500 %}Production insuffisante ({{ production | round(0) }}W < 1500W)
            {% elif ecart_type > 150 %}Production instable - nuages (σ={{ ecart_type | round(0) }}W)
            {% else %}Conditions favorables ✓{% endif %}
  - sensor:
      - name: "Solaire auto-consomme"
        unique_id: solaire_auto_consomme
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: measurement
        icon: mdi:solar-power-variant
        state: >-
          {% set prod = states('sensor.beem_quotidien') | float(0) + states('sensor.beemnquotidien') | float(0) %}
          {% set export = states('sensor.beauvallon_mainstogrid_1d') | float(0) %}
          {{ [prod - export, 0] | max | round(2) }}
      - name: "EDF Tempo Prices"
        unique_id: edf_tempo_prices
        state: "active"
        attributes:
          hc_bleu: 0.1325
          hp_bleu: 0.1612
          hc_blanc: 0.1499
          hp_blanc: 0.1871
          hc_rouge: 0.1575
          hp_rouge: 0.7060
      - name: "Économies SolarFlow Total"
        unique_id: solarflow_discharge_cost_saved_total
        unit_of_measurement: "EUR"
        device_class: monetary
        state_class: total_increasing
        icon: mdi:piggy-bank
        state: >-
          {% set p = state_attr('sensor.edf_tempo_prices', 'hc_bleu') is not none %}
          {% if p %}
            {% set hc_bleu = states('sensor.solarflow_discharge_by_tariff_hc_bleu') | float(0) * state_attr('sensor.edf_tempo_prices', 'hc_bleu') %}
            {% set hp_bleu = states('sensor.solarflow_discharge_by_tariff_hp_bleu') | float(0) * state_attr('sensor.edf_tempo_prices', 'hp_bleu') %}
            {% set hc_blanc = states('sensor.solarflow_discharge_by_tariff_hc_blanc') | float(0) * state_attr('sensor.edf_tempo_prices', 'hc_blanc') %}
            {% set hp_blanc = states('sensor.solarflow_discharge_by_tariff_hp_blanc') | float(0) * state_attr('sensor.edf_tempo_prices', 'hp_blanc') %}
            {% set hc_rouge = states('sensor.solarflow_discharge_by_tariff_hc_rouge') | float(0) * state_attr('sensor.edf_tempo_prices', 'hc_rouge') %}
            {% set hp_rouge = states('sensor.solarflow_discharge_by_tariff_hp_rouge') | float(0) * state_attr('sensor.edf_tempo_prices', 'hp_rouge') %}
            {{ (hc_bleu + hp_bleu + hc_blanc + hp_blanc + hc_rouge + hp_rouge) | round(2) }}
          {% else %}
            0.0
          {% endif %}
shell_command:
  export_solaire_csv: "/bin/bash /config/scripts/export_solaire.sh"
  upload_solaire_gdrive: "/bin/bash /config/scripts/upload_gdrive.sh"
  emporia_weekly_export: >-
    python3 /config/python_scripts/emporia/export_emporia_weekly.py
    >> /config/python_scripts/emporia/logs/shell.log 2>&1
  emporia_fetch_to_drive: >-
    python3 /config/python_scripts/emporia/fetch_emporia_to_drive.py
    >> /config/python_scripts/emporia/logs/shell_fetch.log 2>&1

utility_meter:
  solarflow_discharge_by_tariff:
    source: sensor.solarflow_800_plus_aggr_discharge
    name: "SolarFlow Décharge par Tarif"
    tariffs:
      - hc_bleu
      - hp_bleu
      - hc_blanc
      - hp_blanc
      - hc_rouge
      - hp_rouge
  solarflow_discharge_cost_saved_daily:
    source: sensor.solarflow_discharge_cost_saved_total
    name: "Économies SolarFlow Jour"
    cycle: daily
  solarflow_discharge_cost_saved_weekly:
    source: sensor.solarflow_discharge_cost_saved_total
    name: "Économies SolarFlow Semaine"
    cycle: weekly
  solarflow_discharge_cost_saved_monthly:
    source: sensor.solarflow_discharge_cost_saved_total
    name: "Économies SolarFlow Mois"
    cycle: monthly
  solarflow_discharge_cost_saved_yearly:
    source: sensor.solarflow_discharge_cost_saved_total
    name: "Économies SolarFlow Année"
    cycle: yearly
