sensor:
  ######### Foobot  ##########
  - platform: foobot
    token: !secret "FOOBOT_SECRET_KEY"
    username: !secret "FOOBOT_USERNAME"

  # Historique de la production sur 15 min via statistics
  - platform: statistics
    name: "Solaire stabilité stats"
    entity_id: sensor.total_solaire
    state_characteristic: standard_deviation
    max_age:
      minutes: 15
    sampling_size: 30
    precision: 0

  - platform: statistics
    name: "chauffe_eau_opportunite_stats"
    entity_id: binary_sensor.lancement_chauffe_eau_opportun
    state_characteristic: mean
    max_age:
      minutes: 30
    sampling_size: 60

