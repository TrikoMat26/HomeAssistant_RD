- id: '1779624839201'
  alias: "SolarFlow — Écrêteur température batterie"
  description: "Régule la limite de charge en fonction de la température de l'appareil (sensor.solarflow_800_plus_hyper_tmp) pour éviter la surchauffe. Hystérésis temporelle de 5 min en descente."
  mode: restart
  triggers:
    - platform: homeassistant
      event: start
    # Seuils de montée (immédiat)
    - platform: numeric_state
      entity_id: sensor.solarflow_800_plus_hyper_tmp
      above: 47
    - platform: numeric_state
      entity_id: sensor.solarflow_800_plus_hyper_tmp
      above: 49
    - platform: numeric_state
      entity_id: sensor.solarflow_800_plus_hyper_tmp
      above: 51
    # Seuils de redescente (stabilisation de 5 min sous le seuil avec 1°C de marge)
    - platform: numeric_state
      entity_id: sensor.solarflow_800_plus_hyper_tmp
      below: 50
      for:
        minutes: 5
    - platform: numeric_state
      entity_id: sensor.solarflow_800_plus_hyper_tmp
      below: 48
      for:
        minutes: 5
    - platform: numeric_state
      entity_id: sensor.solarflow_800_plus_hyper_tmp
      below: 46
      for:
        minutes: 5
  actions:
    - variables:
        temp: "{{ states('sensor.solarflow_800_plus_hyper_tmp') | float(0) }}"
        consigne_user: "{{ states('input_select.solarflow_limite_charge') | replace(' W', '') | int(0) }}"
        limite_thermique: >-
          {% if temp >= 51 %}
            100
          {% elif temp >= 49 %}
            300
          {% elif temp >= 47 %}
            700
          {% else %}
            1000
          {% endif %}
        consigne_finale: "{{ [consigne_user, limite_thermique] | min }}"
    # Appliquer la consigne sur la batterie
    - action: number.set_value
      target:
        entity_id: number.solarflow_800_plus_charge_max_limit
      data:
        value: "{{ consigne_finale }}"
    # Gestion des notifications persistantes
    - choose:
        # Cas où le bridage est théoriquement actif
        - conditions:
            - condition: template
              value_template: "{{ limite_thermique < 1000 }}"
          sequence:
            - action: persistent_notification.create
              data:
                title: "🌡️ SolarFlow — Écrêtage thermique actif"
                message: >-
                  Température SolarFlow à {{ temp | round(1) }} °C.
                  Charge bridée à {{ limite_thermique }} W maximum (Consigne utilisateur : {{ consigne_user }} W, Appliquée : {{ consigne_finale }} W).
                notification_id: solarflow_ecretage_temp
        # Cas normal
        - conditions:
            - condition: template
              value_template: "{{ limite_thermique >= 1000 }}"
          sequence:
            - action: persistent_notification.dismiss
              data:
                notification_id: solarflow_ecretage_temp
