        }}
      message: "**Cycle terminé à {{ now().strftime('%H:%M') }}**\n\n- ⚡ Consommation
        : **{{ kwh_cycle }} kWh** ({{ wh_cycle }} Wh)\n- ⏱ Durée : **{{ duree_min
        }} min**\n- \U0001F4CA Période : **{{ tarif_periode }}** ({{ prix_kwh }} €/kWh)\n-
        \U0001F4B6 Coût estimé : **{{ cout_estime }} €**"
  - action: notify.mobile_app_sm_s948b
    data:
      title: "\U0001F6BF Bilan chauffe-eau cuisine"
      message: Cycle terminé à {{ now().strftime('%H:%M') }} · {{ kwh_cycle }} kWh
        · {{ duree_min }} min · {{ tarif_periode }} · {{ cout_estime }} €
