- id: '1776721574868'
  alias: "\U0001F527 Auto-heal Tado"
  description: 'Surveille climate.salon et climate.chambres. Tente reload automatique
    du config entry Tado.


    Trigger 1: transition vers unavailable maintenue 15 min.

    Trigger 2: re-vérification toutes les 15 min (couvre le cas où l''entité est déjà
    unavailable au démarrage de l''auto — pas de transition à détecter).


    Si le reload ne suffit pas (15 min après), notif persistante avec étapes OAuth.

    Mode single + notification_id constant → pas de spam si la panne dure plusieurs
    jours.


    Maintenance : si le config entry Tado est supprimé/recréé, son entry_id change
    → mettre à jour ici. Commande : ha_get_integration(query="tado").'
  triggers:
  - platform: state
    entity_id:
    - climate.salon
    - climate.chambres
    to: unavailable
    for:
      minutes: 15
  - platform: time_pattern
    minutes: /15
    id: periodic_check
  conditions:
  - condition: or
    conditions:
    - condition: state
      entity_id: climate.salon
      state: unavailable
    - condition: state
      entity_id: climate.chambres
      state: unavailable
  actions:
  - alias: Étape 1 — reload du config entry Tado
    action: homeassistant.reload_config_entry
    data:
      entry_id: 01KR406D3HNSDFXENFP3TKN9AX
  - alias: Attendre 15 min pour voir si la reload a suffi
    delay:
      minutes: 15
  - alias: Étape 2 — si toujours cassé, notifier Krikor (dédupliqué via notification_id)
    choose:
    - conditions:
      - condition: state
        entity_id: climate.salon
        state: unavailable
      sequence:
      - action: persistent_notification.create
        data:
          notification_id: tado_auto_heal_failed
          title: ⚠️ Tado toujours cassé après auto-reload
          message: 'Reload automatique effectué il y a 15 min, mais climate.salon
            est toujours unavailable.


            Étapes de récupération manuelle (~5 min) :

            1. Paramètres → Appareils & Services → onglet Réparations

            2. Clique sur ''Ré-authentification Tado''

            3. Visite le lien OAuth avec le code affiché

            4. Approuve sur ton compte Tado → les sensors reviennent


            Si l''OAuth échoue encore : fallback = delete + re-add l''intégration
            depuis l''UI.'
  mode: single
- id: emporia_weekly_export_v1
  alias: "\U0001F50C Emporia — Export hebdomadaire par e-mail"
  description: Chaque lundi 00:10, déclenche l'envoi par e-mail de l'export Emporia
    pour la semaine précédente. L'e-mail arrive directement dans la boîte associée
    au compte Emporia.
  mode: single
  triggers:
  - platform: time
    at: 00:10:00
  conditions:
  - condition: time
    weekday:
    - mon
  actions:
  - alias: Lancer le script d'export
    service: shell_command.emporia_weekly_export
    response_variable: cmd_result
  - alias: Notif succès / échec selon code retour
    choose:
    - conditions:
      - condition: template
        value_template: '{{ cmd_result.returncode == 0 }}'
      sequence:
      - service: persistent_notification.create
        data:
          title: "\U0001F50C Emporia — Export OK"
          notification_id: emporia_weekly_export
          message: Demande d'export envoyée à Emporia pour la semaine précédente.
            Le ZIP arrive par e-mail dans quelques minutes sur l'adresse du compte
            Emporia. (run du {{ now().strftime('%Y-%m-%d %H:%M') }})
    default:
    - service: persistent_notification.create
      data:
        title: ⚠️ Emporia — Échec export
        notification_id: emporia_weekly_export
        message: 'Le script export_emporia_weekly.py a renvoyé code {{ cmd_result.returncode
          }}. Voir /config/python_scripts/emporia/logs/ pour la trace. Codes : 1=API,
          2=secrets, 3=réseau, 4=auth.'
- id: emporia_fetch_to_drive_v1
  alias: "\U0001F4E5 Emporia — Récup mail + Upload Drive"
  description: Chaque lundi 00:30 (20 min après le trigger d'export), récupère le
    ZIP via Gmail API depuis le compte qui reçoit Emporia, le télécharge (lien Mandrill
    → S3) et l'upload sur Google Drive (même dossier que les CSV solaires).
  mode: single
  triggers:
  - platform: time
    at: 00:30:00
  conditions:
  - condition: time
    weekday:
    - mon
  actions:
  - alias: Lancer le script fetch + upload
    service: shell_command.emporia_fetch_to_drive
    response_variable: cmd_result
  - alias: Notif selon code retour
    choose:
    - conditions:
      - condition: template
        value_template: '{{ cmd_result.returncode == 0 }}'
      sequence:
      - service: persistent_notification.create
        data:
          title: "\U0001F4E5 Emporia — Drive OK"
          notification_id: emporia_fetch_to_drive
          message: ZIP Emporia uploadé sur Google Drive (dossier solaire). ({{ now().strftime('%Y-%m-%d
            %H:%M') }})
    - conditions:
      - condition: template
        value_template: '{{ cmd_result.returncode == 5 }}'
      sequence:
      - service: persistent_notification.create
        data:
          title: "\U0001F4ED Emporia — Mail pas (encore) reçu"
          notification_id: emporia_fetch_to_drive
          message: Pas de mail Emporia trouvé dans la dernière 24h. Le mail prend
            parfois plus de 20 min à arriver — re-trigger l'automation manuellement
            plus tard, ou attendre lundi prochain.
    default:
    - service: persistent_notification.create
      data:
        title: ⚠️ Emporia — Échec Drive
        notification_id: emporia_fetch_to_drive
        message: 'fetch_emporia_to_drive.py code {{ cmd_result.returncode }}. Voir
          /config/python_scripts/emporia/logs/. Codes : 2=secrets, 3=net/OAuth, 4=auth,
          5=mail absent, 6=corps vide, 7=URL non trouvée, 8=DL échoué, 9=pas un ZIP,
          10=upload Drive.'
