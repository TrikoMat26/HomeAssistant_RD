- id: '1779033898281'
  alias: HMS-1600 — Écrêteur anti-surtension
  description: 'Écrêteur basé sur la tension AC réelle. Dès que sensor.hms_1600_voltage
    dépasse 250V, applique une limite de 800W pendant 10 min puis remonte progressive.
    Mode restart : si la tension repasse > 250V pendant les 10 min, le cycle recommence.
    Trigger homeassistant/start pour rétablir la limite si HA redémarre.'
  triggers:
  - platform: homeassistant
    event: start
  - platform: numeric_state
    entity_id:
    - sensor.hms_1600_voltage
    above: 250
  actions:
  - choose:
    - conditions:
      - condition: numeric_state
        entity_id: sensor.hms_1600_voltage
        above: 250
      sequence:
      - action: number.set_value
        target:
          entity_id: number.hms_1600_limit_nonpersistent_absolute
        data:
          value: 800
      - action: persistent_notification.create
        data:
          title: "☀️ HMS-1600 — Écrêtage 800W"
          message: "Tension à {{ states('sensor.hms_1600_voltage') | round(1) }} V > 250V. Limitation à 800W active pour stabilisation."
          notification_id: hms_ecretage
      - delay:
          minutes: 10
      - action: number.set_value
        target:
          entity_id: number.hms_1600_limit_nonpersistent_absolute
        data:
          value: 1000
      - action: persistent_notification.create
        data:
          title: "☀️ HMS-1600 — Remontée 1000W"
          message: "Tension stabilisée. Remontée progressive : limite augmentée à 1000W."
          notification_id: hms_ecretage
      - delay:
          minutes: 10
      - action: number.set_value
        target:
          entity_id: number.hms_1600_limit_nonpersistent_absolute
        data:
          value: 1200
      - action: persistent_notification.create
        data:
          title: "☀️ HMS-1600 — Remontée 1200W"
          message: "Tension toujours stable. Remontée progressive : limite augmentée à 1200W."
          notification_id: hms_ecretage
      - delay:
          minutes: 10
      - action: number.set_value
        target:
          entity_id: number.hms_1600_limit_nonpersistent_absolute
        data:
          value: 1600
      - action: persistent_notification.dismiss
        data:
          notification_id: hms_ecretage
    default:
    - action: number.set_value
      target:
        entity_id: number.hms_1600_limit_nonpersistent_absolute
      data:
        value: 1600
    - action: persistent_notification.dismiss
      data:
        notification_id: hms_ecretage
  mode: restart
- id: '1779172974274'
  alias: SolarFlow — Alerte température élevée
  description: Notifie si la température du SolarFlow 800 Plus dépasse 45°C. Dismiss
    automatique quand elle repasse sous 42°C (hystérésis 3°C).
  triggers:
  - platform: numeric_state
    entity_id: sensor.solarflow_800_plus_hyper_tmp
    above: 45
    for: 00:02:00
  - platform: numeric_state
    entity_id: sensor.solarflow_800_plus_hyper_tmp
    below: 42
    for: 00:02:00
  actions:
  - choose:
    - conditions:
      - condition: numeric_state
        entity_id: sensor.solarflow_800_plus_hyper_tmp
        above: 45
      sequence:
      - data:
          title: "\U0001F321️ SolarFlow — Température élevée"
          message: 'Température actuelle : {{ states(''sensor.solarflow_800_plus_hyper_tmp'')
            }} °C (seuil : 45 °C). Vérifier la ventilation.'
          notification_id: solarflow_temperature
        action: persistent_notification.create
    - conditions:
      - condition: numeric_state
        entity_id: sensor.solarflow_800_plus_hyper_tmp
        below: 42
      sequence:
      - data:
          notification_id: solarflow_temperature
        action: persistent_notification.dismiss
  mode: single
  max_exceeded: silent
- id: '1779174125486'
  alias: SolarFlow — Sync limite charge
  description: 'Sync charge → Zendure en appliquant le bridage thermique si nécessaire.'
  triggers:
  - platform: state
    entity_id: input_select.solarflow_limite_charge
  actions:
  - variables:
      valeur_charge: >-
        {{ states('input_select.solarflow_limite_charge') | replace(' W', '') | int(0) }}
      temp: >-
        {{ states('sensor.solarflow_800_plus_hyper_tmp') | float(0) }}
      limite_thermique: >-
        {% if temp >= 51 %}
          100
        {% elif temp >= 49 %}
          300
        {% elif temp >= 47 %}
          700
        {% else %}
          1000
        {% endif %}
      valeur_finale: >-
        {{ [valeur_charge, limite_thermique] | min }}
  - action: number.set_value
    target:
      entity_id: number.solarflow_800_plus_charge_max_limit
    data:
      value: '{{ valeur_finale }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ valeur_charge > 0 }}'
      sequence:
      - action: select.select_option
        target:
          entity_id: select.solarflow_800_plus_ac_mode
        data:
          option: input
      - action: input_select.select_option
        target:
          entity_id: input_select.solarflow_limite_decharge
        data:
          option: 0 W
  mode: single
  max_exceeded: silent
- id: '1779174130202'
  alias: SolarFlow — Sync limite décharge
  description: 'Sync décharge → Zendure en appliquant le bridage thermique si nécessaire.'
  triggers:
  - platform: state
    entity_id: input_select.solarflow_limite_decharge
  actions:
  - variables:
      valeur_decharge: >-
        {{ states('input_select.solarflow_limite_decharge') | replace(' W', '') | int(0) }}
      temp: >-
        {{ states('sensor.solarflow_800_plus_hyper_tmp') | float(0) }}
      limite_thermique: >-
        {% if temp >= 51 %}
          100
        {% elif temp >= 49 %}
          300
        {% elif temp >= 47 %}
          600
        {% else %}
          800
        {% endif %}
      valeur_finale: >-
        {{ [valeur_decharge, limite_thermique] | min }}
  - action: number.set_value
    target:
      entity_id: number.solarflow_800_plus_inverse_max_power
    data:
      value: '{{ valeur_finale }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ valeur_decharge > 0 }}'
      sequence:
      - action: select.select_option
        target:
          entity_id: select.solarflow_800_plus_ac_mode
        data:
          option: output
      - action: input_select.select_option
        target:
          entity_id: input_select.solarflow_limite_charge
        data:
          option: 0 W
  mode: single
  max_exceeded: silent
- id: '1779491383869'
  alias: Recovery SmartMeter 3CT — Mosquitto au démarrage
  description: Redémarre Mosquitto au démarrage de HA pour forcer la reconnexion du
    Zendure 3CT et restaurer les capteurs MQTT.
  triggers:
  - trigger: homeassistant
    event: start
  actions:
  - action: hassio.addon_stop
    data:
      addon: core_mosquitto
  - delay: 00:00:30
  - action: hassio.addon_start
    data:
      addon: core_mosquitto
  - delay: 00:00:15
  - action: homeassistant.reload_config_entry
    data:
      entry_id: b36151823b7a40e2951b294987caaeea
  - wait_for_trigger:
    - trigger: template
      value_template: '{{ has_value(''sensor.te31njn8n386922_l3_p'') }}'
    timeout: 00:01:30
    continue_on_timeout: true
  - action: mqtt.publish
    data:
      topic: Zendure/sensor/TE31NJN8N386922/L1_p/availability
      payload: online
  - action: mqtt.publish
    data:
      topic: Zendure/sensor/TE31NJN8N386922/L2_p/availability
      payload: online
  - action: mqtt.publish
    data:
      topic: Zendure/sensor/TE31NJN8N386922/L3_p/availability
      payload: online
  mode: single
