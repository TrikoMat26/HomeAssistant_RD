    prix_kwh: '{% set p = {''HC BLEU'': 0.1325, ''HP BLEU'': 0.1612, ''HC BLANC'':
      0.1499, ''HP BLANC'': 0.1871, ''HC ROUGE'': 0.1575, ''HP ROUGE'': 0.7060} %}{{
      p.get(states(''input_text.chauffe_eau_cuisine_periode_tarifaire_debut_de_cycle''),
      0.1612) }}'
