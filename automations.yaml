- id: simu_chauffe_eau_on
  alias: "\U0001F31E SIMU — Allumer chauffe-eau si solaire favorable"
  description: Mode simulation — surveille le capteur d'opportunité solaire et trace
    les décisions sans actionner le vrai chauffe-eau.
  triggers:
  - entity_id: binary_sensor.lancement_chauffe_eau_opportun
    to: 'on'
    for:
      minutes: 10
    platform: state
  conditions:
  - condition: sun
    after: sunrise
    before: sunset
  - condition: template
    value_template: '{{ state_attr(''sensor.solaire_stabilite_stats'', ''age_coverage_ratio'')
      | float(0) >= 0.25 }}'
  - condition: template
    value_template: '{{ states(''sensor.total_solaire'') not in [''unavailable'',
      ''unknown''] }}'
  - alias: Les 3 smart switches sont disponibles (sinon la somme total_solaire est
      artificiellement faussee)
    condition: template
    value_template: '{{ states(''sensor.smart_switch_2312075875450151080948e1e9e5a5e0_power'')
