      float(0) }}'
    wh_fin: '{{ states(''sensor.chauffe_eau_cuisine'') | float(0) }}'
    wh_cycle: '{{ (states(''sensor.chauffe_eau_cuisine'') | float(0) - states(''input_number.chauffe_eau_cuisine_wh_debut_de_cycle'')
