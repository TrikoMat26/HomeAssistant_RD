    arrêt du chauffe-eau cuisine, en comparant les Wh cumulés avant et après.
  triggers:
  - platform: state
    entity_id: switch.chauffe_eau_cuisine
    from: 'on'
    to: 'off'
  conditions:
  - condition: numeric_state
    entity_id: input_number.chauffe_eau_cuisine_wh_debut_de_cycle
    above: 0
  actions:
  - action: persistent_notification.create
